name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Sign Windows build (Azure Trusted Signing)
    runs-on: windows-latest
    env:
      # Account + Public Trust profile. Not inherently secret, but stored as
      # repo Secrets here to match how they were configured.
      AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
      AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
      AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      # Service principal creds. Need the
      # "Trusted Signing Certificate Profile Signer" role on the account.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # Installs the Azure Code Signing dlib and locates signtool, then exports
      # AZURE_CODE_SIGNING_DLIB + SIGNTOOL_PATH so forge.config.ts activates
      # Windows signing. Keep install paths space-free (signWithParams is split
      # on spaces by @electron/windows-sign).
      - name: Set up Trusted Signing toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Artifact Signing dlib (formerly Microsoft.Trusted.Signing.Client; renamed
          # and old package unlisted by Microsoft in the Trusted Signing → Artifact
          # Signing rebrand).
          $nuget = "$env:RUNNER_TEMP\nuget.exe"
          Invoke-WebRequest "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nuget
          & $nuget install Microsoft.ArtifactSigning.Client `
            -OutputDirectory "$env:RUNNER_TEMP\ts" -ExcludeVersion
          $dlib = "$env:RUNNER_TEMP\ts\Microsoft.ArtifactSigning.Client\bin\x64\Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path $dlib)) { throw "Azure dlib not found at $dlib" }
          "AZURE_CODE_SIGNING_DLIB=$dlib" | Out-File -FilePath $env:GITHUB_ENV -Append

          # Newest signtool.exe from the installed Windows SDK.
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found in Windows SDK" }
          "SIGNTOOL_PATH=$($signtool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Diagnose all makers
        shell: pwsh
        run: |
          node -e "
          const sq = require('@electron-forge/maker-squirrel');
          const zip = require('@electron-forge/maker-zip');
          const dmg = require('@electron-forge/maker-dmg');
          const rpm = require('@electron-forge/maker-rpm');
          const deb = require('@electron-forge/maker-deb');
          const ctors = [
            ['MakerSquirrel', sq.MakerSquirrel || sq.default],
            ['MakerZIP', zip.MakerZIP || zip.default],
            ['MakerDMG', dmg.MakerDMG || dmg.default],
            ['MakerRpm', rpm.MakerRpm || rpm.default],
            ['MakerDeb', deb.MakerDeb || deb.default],
          ];
          for (const [name, C] of ctors) {
            try {
              const m = new C({});
              const platforms = m.platforms || m.defaultPlatforms;
              const supported = m.isSupportedOnCurrentPlatform();
              console.log(name, '| platforms=' + JSON.stringify(platforms), '| isSupported=' + supported);
            } catch (e) {
              console.log(name, '| CONSTRUCTOR THREW:', e.message);
            }
          }
          "

      - name: Make (sign app + Squirrel installer)
        env:
          DEBUG: "electron-forge:*,electron-packager,@electron/windows-sign,electron-windows-sign"
        run: pnpm make

      - name: Show workspace after make
        if: always()
        shell: pwsh
        run: |
          Write-Host "CWD: $(Get-Location)"
          if (Test-Path out) {
            Get-ChildItem -Path out -Recurse | Select-Object FullName | Format-Table -AutoSize -Wrap
          } else {
            Write-Host "out\ does not exist after make"
            Get-ChildItem -Path . | Select-Object Name | Format-Table -AutoSize
          }

      - name: Verify signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $setup = Get-ChildItem -Path out\make -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $setup) { throw "No Setup .exe produced under out\make" }
          Write-Host "Verifying: $($setup.FullName)"
          & "$env:SIGNTOOL_PATH" verify /pa /v "$($setup.FullName)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lychee-windows
          path: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          $assets = Get-ChildItem -Path out\make -Recurse -Include *.exe,*.nupkg,RELEASES |
            ForEach-Object { $_.FullName }
          # Create the release if this job got here first; otherwise attach to the
          # one the macOS workflow created.
          gh release create $tag $assets --title $tag --generate-notes
          if ($LASTEXITCODE -ne 0) {
            gh release upload $tag $assets --clobber
          }
