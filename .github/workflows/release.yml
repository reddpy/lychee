name: Release

# Tag-push orchestrator: fans out to the three reusable build-*.yml workflows
# in parallel, then publishes a single GitHub Release once they all succeed.
# Manual single-platform testing happens by dispatching the individual
# build-*.yml workflows directly from the Actions UI.
on:
  push:
    tags:
      - "v*"
  # Also lets the orchestrator be manually dispatched as a full-pipeline
  # dry-run. publish-release is tag-gated, so dispatching from a branch
  # builds all three platforms in one parent run but creates no Release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  build-linux:
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit

  publish-release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lychee-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # upload-artifact preserves each build's internal layout (deb/x64/…,
          # squirrel.windows/x64/…), so release-assets/* would feed directories
          # into gh release create. Flatten to a file list, NUL-delimited to
          # tolerate the space in "Lychee-<version> Setup.exe".
          find release-assets -type f -print0 | xargs -0 ls -la
          mapfile -d '' -t assets < <(find release-assets -type f -print0)
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
