name: Release

# Tag-push orchestrator: fans out to the three reusable build-*.yml workflows
# in parallel, then publishes a single GitHub Release once they all succeed.
# Manual single-platform testing happens by dispatching the individual
# build-*.yml workflows directly from the Actions UI.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  build-linux:
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit

  publish-release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lychee-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ls -la release-assets
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
