name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # Per-platform toggles for manual runs. Tag pushes ignore these and always
    # build everything. Defaults are true so a no-input dispatch matches a
    # tag run.
    inputs:
      build_macos:
        description: "Build macOS"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64, signed + notarized)
    if: github.event_name != 'workflow_dispatch' || inputs.build_macos
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # node 22 (LTS): Electron Forge resolves instance-form makers to empty
          # targets on node 24, producing no distributables.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW=$(openssl rand -base64 24)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Put the temp keychain first in the search list so codesign finds the identity
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Make (sign + notarize + DMG/ZIP)
        run: pnpm make

      - name: Verify signature + notarization
        run: |
          set -euo pipefail
          APP=$(find out -maxdepth 3 -name "*.app" -type d | head -n 1)
          echo "Verifying: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose "$APP"
          xcrun stapler validate "$APP"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lychee-macos
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  build-windows:
    name: Build Windows (signed via Azure Trusted Signing)
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    runs-on: windows-latest
    env:
      # Account + Public Trust profile. Not inherently secret, but stored as
      # repo Secrets here to match how they were configured.
      AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
      AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
      AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      # Service principal creds. Need the
      # "Trusted Signing Certificate Profile Signer" role on the account.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # Installs the Azure Code Signing dlib and locates signtool, then exports
      # AZURE_CODE_SIGNING_DLIB + SIGNTOOL_PATH so forge.config.ts activates
      # Windows signing. Keep install paths space-free (signWithParams is split
      # on spaces by @electron/windows-sign).
      - name: Set up Trusted Signing toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Artifact Signing dlib (formerly Microsoft.Trusted.Signing.Client; renamed
          # and old package unlisted by Microsoft in the Trusted Signing → Artifact
          # Signing rebrand).
          $nuget = "$env:RUNNER_TEMP\nuget.exe"
          Invoke-WebRequest "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nuget
          & $nuget install Microsoft.ArtifactSigning.Client `
            -OutputDirectory "$env:RUNNER_TEMP\ts" -ExcludeVersion
          $dlib = "$env:RUNNER_TEMP\ts\Microsoft.ArtifactSigning.Client\bin\x64\Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path $dlib)) { throw "Azure dlib not found at $dlib" }
          "AZURE_CODE_SIGNING_DLIB=$dlib" | Out-File -FilePath $env:GITHUB_ENV -Append

          # Newest signtool.exe from the installed Windows SDK.
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found in Windows SDK" }
          "SIGNTOOL_PATH=$($signtool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Diagnose all makers
        shell: pwsh
        run: |
          node -e "
          const sq = require('@electron-forge/maker-squirrel');
          const zip = require('@electron-forge/maker-zip');
          const dmg = require('@electron-forge/maker-dmg');
          const rpm = require('@electron-forge/maker-rpm');
          const deb = require('@electron-forge/maker-deb');
          const ctors = [
            ['MakerSquirrel', sq.MakerSquirrel || sq.default],
            ['MakerZIP', zip.MakerZIP || zip.default],
            ['MakerDMG', dmg.MakerDMG || dmg.default],
            ['MakerRpm', rpm.MakerRpm || rpm.default],
            ['MakerDeb', deb.MakerDeb || deb.default],
          ];
          for (const [name, C] of ctors) {
            try {
              const m = new C({});
              const platforms = m.platforms || m.defaultPlatforms;
              const supported = m.isSupportedOnCurrentPlatform();
              console.log(name, '| platforms=' + JSON.stringify(platforms), '| isSupported=' + supported);
            } catch (e) {
              console.log(name, '| CONSTRUCTOR THREW:', e.message);
            }
          }
          "

      - name: Make (sign app + Squirrel installer)
        env:
          DEBUG: "electron-forge:*,electron-packager,@electron/windows-sign,electron-windows-sign"
        run: pnpm make

      - name: Show workspace after make
        if: always()
        shell: pwsh
        run: |
          Write-Host "CWD: $(Get-Location)"
          if (Test-Path out) {
            Get-ChildItem -Path out -Recurse | Select-Object FullName | Format-Table -AutoSize -Wrap
          } else {
            Write-Host "out\ does not exist after make"
            Get-ChildItem -Path . | Select-Object Name | Format-Table -AutoSize
          }

      - name: Verify signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $setup = Get-ChildItem -Path out\make -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $setup) { throw "No Setup .exe produced under out\make" }
          Write-Host "Verifying: $($setup.FullName)"
          & "$env:SIGNTOOL_PATH" verify /pa /v "$($setup.FullName)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lychee-windows
          path: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
          retention-days: 30

  build-linux:
    name: Build Linux (.deb + .rpm)
    if: github.event_name != 'workflow_dispatch' || inputs.build_linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # node 22 (LTS): Electron Forge resolves instance-form makers to empty
          # targets on node 24, producing no distributables.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # MakerDeb needs dpkg + fakeroot; MakerRpm needs rpmbuild. ubuntu-latest
      # ships dpkg but not fakeroot/rpm.
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      # No signing on Linux — autoUpdater is unsupported there, so the in-app
      # updater is notify-only (see src/main/updater.ts). These artifacts just
      # need to exist on the release for the "Download" button to point at.
      - name: Make (.deb + .rpm)
        run: pnpm make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lychee-linux
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lychee-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ls -la release-assets
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
