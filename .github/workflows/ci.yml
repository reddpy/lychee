name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # pretest hook automatically runs pnpm rebuild:sqlite before vitest
      - name: Run backend tests
        run: pnpm test

  e2e-build:
    name: E2E Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Package Electron app
        run: E2E=1 pnpm run package

      - name: Archive packaged app (preserves file permissions)
        run: tar -cf electron-app.tar -C out .

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: electron-app
          path: electron-app.tar
          retention-days: 1

  e2e-test:
    name: E2E (${{ matrix.name }})
    needs: e2e-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: breadcrumb-pill
            specs: e2e/breadcrumb-pill.spec.ts
          - name: table
            specs: e2e/table.spec.ts
          - name: sidebar-tree
            specs: e2e/sidebar-tree.spec.ts e2e/dark-mode.spec.ts
          - name: editor
            specs: e2e/editor.spec.ts e2e/title-typing.spec.ts
            workers: 1
          - name: media
            specs: e2e/image-bookmark-embed.spec.ts e2e/trash.spec.ts e2e/persistence.spec.ts
            workers: 1
          - name: search-palette
            specs: e2e/search-palette.spec.ts
            workers: 1
          - name: in-note-search
            specs: e2e/in-note-search.spec.ts
            workers: 1
          - name: bookmarks
            specs: e2e/document-bookmarks.spec.ts e2e/bookmark-metadata.spec.ts e2e/bookmark-cross-functional.spec.ts
            workers: 1
          - name: duplicate-tabs
            specs: e2e/duplicate-tabs.spec.ts
            workers: 1
          - name: tab-preview
            specs: e2e/tab-preview.spec.ts
            workers: 1
          - name: misc
            specs: e2e/youtube-embed.spec.ts e2e/settings.spec.ts e2e/sidebar.spec.ts e2e/tabs.spec.ts e2e/app-launch.spec.ts
            workers: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            libgbm1 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxkbcommon0

      - name: Download packaged app
        uses: actions/download-artifact@v4
        with:
          name: electron-app

      - name: Extract packaged app (preserves file permissions)
        run: mkdir -p out && tar -xf electron-app.tar -C out

      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" pnpm exec playwright test ${{ matrix.specs }}${{ matrix.workers && format(' --workers={0}', matrix.workers) || '' }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.name }}
          path: blob-report/
          retention-days: 1

  e2e-report:
    name: E2E Report
    if: always()
    needs: e2e-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
