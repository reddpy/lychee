name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.16.0 breaks extract-zip/yauzl (truncates the Electron
          # archive), so electron's postinstall and electron-forge packaging both
          # silently fail. 24.15.0 is the last clean version. See README/CI notes.
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # pretest hook automatically runs pnpm rebuild:sqlite before vitest
      - name: Run backend tests
        run: pnpm test

  e2e-build:
    name: E2E Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.16.0 breaks extract-zip/yauzl (truncates the Electron
          # archive), so electron's postinstall and electron-forge packaging both
          # silently fail. 24.15.0 is the last clean version. See README/CI notes.
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Package Electron app
        run: E2E=1 pnpm run package

      - name: Archive packaged app (preserves file permissions)
        run: tar -cf electron-app.tar -C out .

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: electron-app
          path: electron-app.tar
          retention-days: 1

  e2e-test:
    name: E2E (${{ matrix.name }})
    needs: e2e-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # NOTE: this is a hand-maintained allowlist — `playwright test <specs>`
        # only runs what's listed here. Any new e2e/*.spec.ts must be added to a
        # group below or it will silently never run in CI.
        include:
          - name: breadcrumb-bar
            specs: e2e/breadcrumb-bar.spec.ts
            workers: 1
          - name: table
            specs: e2e/table.spec.ts
          - name: sidebar-tree
            specs: e2e/sidebar-tree.spec.ts e2e/dark-mode.spec.ts
          - name: editor
            specs: e2e/editor.spec.ts e2e/title-typing.spec.ts
            workers: 1
          - name: list-backspace
            specs: e2e/list-backspace.spec.ts
            workers: 1
          - name: media
            specs: e2e/image-bookmark-embed.spec.ts e2e/trash.spec.ts e2e/persistence.spec.ts
            workers: 1
          - name: search-palette
            specs: e2e/search-palette.spec.ts
            workers: 1
          - name: in-note-search
            specs: e2e/in-note-search.spec.ts
            workers: 1
          - name: bookmarks
            specs: e2e/document-bookmarks.spec.ts e2e/bookmark-metadata.spec.ts e2e/bookmark-cross-functional.spec.ts
            workers: 1
          - name: duplicate-tabs
            specs: e2e/duplicate-tabs.spec.ts
            workers: 1
          - name: tab-scroll-retention
            specs: e2e/tab-scroll-retention.spec.ts
            workers: 1
          - name: tab-preview
            specs: e2e/tab-preview.spec.ts
            workers: 1
          - name: text-formats
            specs: e2e/text-formats.spec.ts
            workers: 1
          - name: menu-shortcuts
            specs: e2e/menu-shortcuts.spec.ts
          - name: misc
            specs: e2e/settings.spec.ts e2e/sidebar.spec.ts e2e/tabs.spec.ts e2e/app-launch.spec.ts e2e/content-security-policy.spec.ts e2e/error-boundary.spec.ts
            workers: 1
          - name: sidebar-sections
            specs: e2e/sidebar-context-menu.spec.ts e2e/sidebar-section-reorder.spec.ts e2e/section-indicator.spec.ts
            workers: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.16.0 breaks extract-zip/yauzl (truncates the Electron
          # archive), so electron's postinstall and electron-forge packaging both
          # silently fail. 24.15.0 is the last clean version. See README/CI notes.
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            libgbm1 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxkbcommon0

      - name: Download packaged app
        uses: actions/download-artifact@v4
        with:
          name: electron-app

      - name: Extract packaged app (preserves file permissions)
        run: mkdir -p out && tar -xf electron-app.tar -C out

      - name: Run E2E tests
        # E2E=1 is required at runtime — not just at build — to enable the
        # preload-side IPC mock layer (see src/preload.ts, e2e/ipc-mock.ts).
        # Without it, mock-driven tests in bookmark-metadata.spec.ts throw
        # "IPC mocks unavailable".
        run: E2E=1 xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" pnpm exec playwright test ${{ matrix.specs }}${{ matrix.workers && format(' --workers={0}', matrix.workers) || '' }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.name }}
          path: blob-report/
          retention-days: 1

  e2e-report:
    name: E2E Report
    if: always()
    needs: e2e-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.16.0 breaks extract-zip/yauzl (truncates the Electron
          # archive), so electron's postinstall and electron-forge packaging both
          # silently fail. 24.15.0 is the last clean version. See README/CI notes.
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
