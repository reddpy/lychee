name: Release Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Linux packages (.deb / .rpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          # node 22 (LTS): Electron Forge resolves instance-form makers to empty
          # targets on node 24, producing no distributables. Matches the working
          # Windows release workflow (see commit 59d2382).
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # MakerDeb needs dpkg + fakeroot; MakerRpm needs rpmbuild. ubuntu-latest
      # ships dpkg but not fakeroot/rpm.
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      # No signing on Linux — autoUpdater is unsupported there, so the in-app
      # updater is notify-only (see src/main/updater.ts). These artifacts just
      # need to exist on the release for the "Download" button to point at.
      - name: Make (.deb + .rpm)
        run: pnpm make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lychee-linux
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find out/make -type f \( -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-assets/ \;
          # Create the release if this job got here first; otherwise attach to
          # the one the macOS/Windows workflow already created.
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
